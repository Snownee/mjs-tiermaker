name: Deploy to GitHub Pages

on:
  push:
    branches: [main] # 监听 main 分支的推送

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and Build
        run: |
          npm install
          npm run build
        env:
          MJS_TIERMAKER_BASE_URL: "/mjs-tiermaker/"

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vue 打包后的文件夹名称
          branch: gh-pages # 部署到的目标分支
