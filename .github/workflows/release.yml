name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all variants
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p releases
          variants=(mjs ark rocom ww)

          for variant in "${variants[@]}"; do
            npm run "set_${variant}"
            npm run build

            artifact="releases/release-build-${variant}.zip"
            rm -f "$artifact"
            (cd dist && zip -r "../$artifact" .)
          done

      - name: Publish releases
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          variants=(mjs ark rocom ww)

          for variant in "${variants[@]}"; do
            tag="${GITHUB_REF_NAME}+${variant}"
            artifact="releases/release-build-${variant}.zip"

            if gh release view "$tag" >/dev/null 2>&1; then
              gh release upload "$tag" "$artifact" --clobber
            else
              gh release create "$tag" "$artifact" --title "$tag"
            fi
          done
