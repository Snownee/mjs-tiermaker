<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>居中容器示例</title>
    <style>
        /* 外层：控制容器整体的位置 */
        .dialog {
            width: 100%;
            background-color: #eee;
            /* 关键：让 inline-flex 的子容器在这一层居中 */
            display: flex;
            justify-content: center;
        }

        /* 容器：包裹所有的 item */
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
            /* 内部左对齐 */

            /* 核心代码：让容器宽度精准等于内容宽度 */
            width: fit-content;

            /* 注意：必须给容器一个最大宽度限制，否则它不会换行 */
            max-width: 440px;

            background: white;
            border: 1px solid #000;
        }

        /* 子元素：固定宽度 */
        .item {
            width: 80px;
            height: 80px;
            margin: 5px;
            background-color: #4CAF50;
            color: white;
            display: flex;
            /* 让文字在 item 内部居中 */
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="dialog">
        <div class="container">
            <div class="item">A</div>
            <div class="item">A</div>
            <div class="item">A</div>
            <div class="item">A</div>
            <div class="item">B</div>
            <div class="item">B</div>
            <div class="item">B</div>
            <div class="item">B</div>
            <div class="item">C</div>
            <div class="item">C</div>
        </div>
    </div>

</body>

</html>
